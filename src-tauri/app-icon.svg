<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 深墨背景上的琥珀辉光（CRT 致敬） -->
    <radialGradient id="glow" cx="36%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ff9f1c" stop-opacity="0.24"/>
      <stop offset="50%" stop-color="#ff9f1c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff9f1c" stop-opacity="0"/>
    </radialGradient>
    <!-- 终端屏幕的纵向渐变 -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161a22"/>
      <stop offset="100%" stop-color="#0f1218"/>
    </linearGradient>
  </defs>

  <!-- 满铺背景（不预圆角，交给各平台系统蒙版裁切） -->
  <rect width="1024" height="1024" fill="#0b0d12"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- 终端窗口 -->
  <rect x="148" y="236" width="728" height="552" rx="66" ry="66"
        fill="url(#screen)" stroke="#ff9f1c" stroke-opacity="0.55" stroke-width="6"/>
  <!-- 标题栏分隔线 -->
  <line x1="214" y1="338" x2="810" y2="338" stroke="#262a33" stroke-width="2"/>
  <!-- 红绿黄圆点（琥珀强调） -->
  <circle cx="220" cy="296" r="16" fill="#ff9f1c"/>
  <circle cx="268" cy="296" r="16" fill="#3a3f4a"/>
  <circle cx="316" cy="296" r="16" fill="#3a3f4a"/>

  <!-- 琥珀提示符 `>` -->
  <path d="M 250 452 L 338 540 L 250 628"
        fill="none" stroke="#ff9f1c" stroke-width="50"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 光标块 -->
  <rect x="398" y="470" width="58" height="140" rx="16" ry="16" fill="#ff9f1c"/>

  <!-- 第二行（弱化，增加终端层次） -->
  <path d="M 250 690 L 300 732 L 250 774"
        fill="none" stroke="#ff9f1c" stroke-opacity="0.30" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="348" y="722" width="200" height="20" rx="10" ry="10" fill="#ff9f1c" fill-opacity="0.18"/>
</svg>
