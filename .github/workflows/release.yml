name: Release

# 打 tag（v*）时自动在 macOS / Windows / Linux 三平台构建安装包，
# 汇总到一个 GitHub Draft Release，手动核对后点 Publish 即可。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Updater 私钥未配置或格式无效时关闭产物生成，避免 Release 打包失败
      - name: Prepare updater signing options
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node .github/scripts/prepare-release.mjs

      # macOS：导入 Developer ID 证书到临时钥匙串，供 codesign / notarize 使用。
      # 未配置 APPLE_CERTIFICATE 时跳过，仍产出未签名包（与 v0.7.x 行为一致）。
      - name: Import Apple Developer certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE 未配置，跳过 codesign 钥匙串导入（产出未签名 .dmg）。"
            echo "MACOS_SIGNED=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "已配置 APPLE_CERTIFICATE 但缺少 KEYCHAIN_PASSWORD，无法导入证书。"
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          echo "MACOS_SIGNED=true" >> "$GITHUB_ENV"

      # 可选：App Store Connect API 公证（与 Apple ID 二选一）
      - name: Prepare App Store Connect API key (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_API_PRIVATE_KEY" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "未配置 APPLE_API_PRIVATE_KEY，公证将尝试 Apple ID 方式（APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID）。"
            exit 0
          fi
          mkdir -p "$HOME/.private_keys"
          KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # 证书已在上方导入钥匙串；无证书时用 ad-hoc 签名（-），且跳过公证 env
      - name: Configure macOS codesign identity
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ "${MACOS_SIGNED:-false}" = "true" ] && [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET" >> "$GITHUB_ENV"
            # 仅在有 Developer ID 证书时注入公证凭据（避免空 APPLE_TEAM_ID 触发 notarize 失败）
            [ -n "$APPLE_ID" ] && echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            [ -n "$APPLE_PASSWORD" ] && echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            [ -n "$APPLE_TEAM_ID" ] && echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            [ -n "$APPLE_API_ISSUER" ] && echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            [ -n "$APPLE_API_KEY" ] && echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'simpl-ssh ${{ github.ref_name }}'
          releaseBody: |
            在下方 **Assets** 选择对应平台的安装包下载。
            - macOS：`.dmg`（Apple Silicon 选 aarch64，Intel 选 x64）
              - 已配置 Apple Secrets 时：Developer ID 签名 + Apple 公证，可直接双击安装
              - 未配置 Secrets 时：ad-hoc 签名，若 Gatekeeper 提示「已损坏」执行 `xattr -cr "/Applications/Simpl SSH.app"`
            - Windows：`-setup.exe` 或 `.msi`
            - Linux：`.AppImage` 或 `.deb`

            变更说明见 [CHANGELOG](https://github.com/yuanqinglong5413/simpl-ssh-client/blob/main/CHANGELOG.md)。
          includeUpdaterJson: ${{ env.INCLUDE_UPDATER_JSON != 'false' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
